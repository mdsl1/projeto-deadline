services:
  db:
    image: mongo:latest
    container_name: db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ../database:/docker-entrypoint-initdb.d
    networks:
      - app-network
  
  api:
    build:
      context: ../api
      dockerfile: ./docker/Dockerfile
    container_name: api
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://db:27017/deadline_db
    volumes:
      - ../api:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      - db
    networks:
      - app-network

  app:
    build:
      context: ../react
      dockerfile: ./docker/Dockerfile
    container_name: app
    ports:
      - "5173:5173"
    volumes:
      - ../react:/app
      - /app/node_modules
    stdin_open: true
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data: